<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoundGraph — Analyzing…</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c10;
      --accent: #00e5a0;
      --accent2: #0099ff;
      --text: #e8f0f5;
      --muted: #4a6070;
      --border: #1e2d38;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.2rem;
      color: var(--accent);
      letter-spacing: -0.02em;
    }
    .logo span { color: var(--text); }

    .spinner-wrap {
      position: relative;
      width: 120px;
      height: 120px;
    }

    .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid transparent;
    }

    .ring-outer {
      border-top-color: var(--accent);
      animation: spin 1.4s linear infinite;
    }

    .ring-mid {
      inset: 14px;
      border-right-color: var(--accent2);
      animation: spin 1.0s linear infinite reverse;
    }

    .ring-inner {
      inset: 28px;
      border-bottom-color: var(--accent);
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .pct {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      color: var(--accent);
    }

    .message {
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-align: center;
      max-width: 320px;
      min-height: 1.5em;
      transition: opacity 0.3s;
    }

    /* Progress bar */
    .progress-track {
      width: 320px;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 2px;
      transition: width 0.5s ease;
      width: 0%;
    }

    /* Steps */
    .steps {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      width: 320px;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.7rem;
      color: var(--muted);
      transition: color 0.3s;
    }

    .step.active { color: var(--text); }
    .step.done   { color: var(--accent); }

    .step-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .step.active .step-dot { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }
    .step.done   .step-dot { background: var(--accent); }
  </style>
</head>
<body>
  <div class="logo">Sound<span>Graph</span></div>

  <div class="spinner-wrap">
    <div class="ring ring-outer"></div>
    <div class="ring ring-mid"></div>
    <div class="ring ring-inner"></div>
    <div class="pct" id="pct">0%</div>
  </div>

  <div class="progress-track">
    <div class="progress-fill" id="bar"></div>
  </div>

  <div class="message" id="msg">Initialising pipeline…</div>

  <div class="steps">
    <div class="step" id="s1"><div class="step-dot"></div>Spotify top artists & tracks</div>
    <div class="step" id="s2"><div class="step-dot"></div>User profile & genre distribution</div>
    <div class="step" id="s3"><div class="step-dot"></div>Last.fm similar-artist graph</div>
    <div class="step" id="s4"><div class="step-dot"></div>Bluesky buzz signals</div>
    <div class="step" id="s5"><div class="step-dot"></div>Taste + social + buzz scoring</div>
    <div class="step" id="s6"><div class="step-dot"></div>Naive Bayes classifier</div>
  </div>

  <script>
    const JOB_ID = "{{ job_id }}";
    const pct    = document.getElementById('pct');
    const bar    = document.getElementById('bar');
    const msg    = document.getElementById('msg');

    const steps = [
      { el: document.getElementById('s1'), threshold: 15 },
      { el: document.getElementById('s2'), threshold: 35 },
      { el: document.getElementById('s3'), threshold: 55 },
      { el: document.getElementById('s4'), threshold: 68 },
      { el: document.getElementById('s5'), threshold: 82 },
      { el: document.getElementById('s6'), threshold: 92 },
    ];

    function updateSteps(progress) {
      steps.forEach(s => {
        if (progress >= s.threshold + 10) {
          s.el.className = 'step done';
        } else if (progress >= s.threshold - 5) {
          s.el.className = 'step active';
        }
      });
    }

    async function poll() {
      try {
        const res  = await fetch(`/status/${JOB_ID}`);
        const data = await res.json();

        pct.textContent = data.progress + '%';
        bar.style.width = data.progress + '%';
        msg.textContent = data.message || '';
        updateSteps(data.progress);

        if (data.status === 'done') {
          window.location.href = `/results/${JOB_ID}`;
          return;
        }
        if (data.status === 'error') {
          msg.textContent = 'Error: ' + (data.error || 'something went wrong');
          return;
        }
        setTimeout(poll, 1500);
      } catch (e) {
        setTimeout(poll, 3000);
      }
    }

    poll();
  </script>
</body>
</html>
