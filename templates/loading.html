<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Recommender — Running</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f7f7;
      color: #222;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 8px;
      padding: 40px 48px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    h1 { font-size: 1.3rem; margin-bottom: 6px; }
    .msg { color: #666; font-size: 0.85rem; margin: 16px 0 8px; min-height: 1.2em; }
    .track {
      width: 100%;
      height: 8px;
      background: #eee;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .fill {
      height: 100%;
      background: #1db954;
      border-radius: 4px;
      transition: width 0.5s ease;
      width: 0%;
    }
    .pct { font-size: 0.8rem; color: #999; margin-bottom: 24px; }
    .steps { list-style: none; padding: 0; }
    .steps li {
      font-size: 0.82rem;
      padding: 5px 0;
      color: #bbb;
      display: flex;
      gap: 8px;
      align-items: center;
      border-bottom: 1px solid #f0f0f0;
      transition: color 0.3s;
    }
    .steps li:last-child { border-bottom: none; }
    .steps li.done { color: #1db954; }
    .steps li.active { color: #222; font-weight: 500; }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #ddd;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .done .dot { background: #1db954; }
    .active .dot { background: #222; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Running pipeline…</h1>
    <p class="msg" id="msg">Starting up…</p>
    <div class="track"><div class="fill" id="fill"></div></div>
    <p class="pct" id="pct">0%</p>

    <ul class="steps">
      <li id="s1"><div class="dot"></div>Fetching Spotify top artists &amp; tracks</li>
      <li id="s2"><div class="dot"></div>Building genre &amp; tag profile</li>
      <li id="s3"><div class="dot"></div>Last.fm similar-artist graph expansion</li>
      <li id="s4"><div class="dot"></div>Bluesky buzz &amp; sentiment</li>
      <li id="s5"><div class="dot"></div>Taste + social + buzz scoring</li>
      <li id="s6"><div class="dot"></div>Naive Bayes classifier</li>
    </ul>
  </div>

  <script>
    const JOB_ID = "{{ job_id }}";
    const steps = [
      { el: document.getElementById("s1"), at: 15 },
      { el: document.getElementById("s2"), at: 35 },
      { el: document.getElementById("s3"), at: 55 },
      { el: document.getElementById("s4"), at: 68 },
      { el: document.getElementById("s5"), at: 82 },
      { el: document.getElementById("s6"), at: 92 },
    ];
    function updateSteps(p) {
      steps.forEach(s => {
        if (p >= s.at + 10) s.el.className = "done";
        else if (p >= s.at - 5) s.el.className = "active";
      });
    }
    async function poll() {
      try {
        const res  = await fetch("/status/" + JOB_ID);
        const data = await res.json();
        document.getElementById("fill").style.width = data.progress + "%";
        document.getElementById("pct").textContent  = data.progress + "%";
        document.getElementById("msg").textContent   = data.message || "";
        updateSteps(data.progress);
        if (data.status === "done") {
          window.location.href = "/results/" + JOB_ID;
        } else if (data.status === "error") {
          document.getElementById("msg").textContent = "Error: " + data.error;
        } else {
          setTimeout(poll, 1500);
        }
      } catch(e) { setTimeout(poll, 3000); }
    }
    poll();
  </script>
</body>
</html>
